      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=gridsentinel-token
      - INFLUXDB_ORG=gridsentinel
      - INFLUXDB_BUCKET=telemetry
      - REDIS_URL=redis://redis:6379
      - DEPOT_ID=4
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gridsentinel

  # ---------------------------------------------------------------------------
  # Phase 2 — Forecasting
  # ---------------------------------------------------------------------------

  forecasting:
    <<: *python-base
    container_name: gs-forecasting
    command: python -m forecasting.main
    depends_on:
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Phase 3 — MPC (one solver per depot)
  # ---------------------------------------------------------------------------

  mpc-depot-0:
    <<: *python-base
    container_name: gs-mpc-d0
    command: python -m mpc.depot.solver --depot-id 0
    environment:
      - CONFIG_PATH=/app/config/fleet.yaml
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=gridsentinel-token
      - INFLUXDB_ORG=gridsentinel
      - INFLUXDB_BUCKET=telemetry
      - REDIS_URL=redis://redis:6379
      - DEPOT_ID=0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gridsentinel

  mpc-depot-1:
    <<: *python-base
    container_name: gs-mpc-d1
    command: python -m mpc.depot.solver --depot-id 1
    environment:
      - CONFIG_PATH=/app/config/fleet.yaml
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=gridsentinel-token
      - INFLUXDB_ORG=gridsentinel
      - INFLUXDB_BUCKET=telemetry
      - REDIS_URL=redis://redis:6379
      - DEPOT_ID=1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gridsentinel

  mpc-depot-2:
    <<: *python-base
    container_name: gs-mpc-d2
    command: python -m mpc.depot.solver --depot-id 2
    environment:
      - CONFIG_PATH=/app/config/fleet.yaml
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=gridsentinel-token
      - INFLUXDB_ORG=gridsentinel
      - INFLUXDB_BUCKET=telemetry
      - REDIS_URL=redis://redis:6379
      - DEPOT_ID=2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gridsentinel

  mpc-depot-3:
    <<: *python-base
    container_name: gs-mpc-d3
    command: python -m mpc.depot.solver --depot-id 3
    environment:
      - CONFIG_PATH=/app/config/fleet.yaml
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=gridsentinel-token
      - INFLUXDB_ORG=gridsentinel
      - INFLUXDB_BUCKET=telemetry
