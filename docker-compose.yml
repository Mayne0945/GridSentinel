  digital-twin-depot-3:
    <<: *python-base
    container_name: gs-dt-d3
    command: python -m digital_twin.main --depot-id 3
    environment:
      - CONFIG_PATH=/app/config/fleet.yaml
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=gridsentinel-token
      - INFLUXDB_ORG=gridsentinel
      - INFLUXDB_BUCKET=telemetry
      - REDIS_URL=redis://redis:6379
      - DEPOT_ID=3
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gridsentinel

  digital-twin-depot-4:
    <<: *python-base
    container_name: gs-dt-d4
    command: python -m digital_twin.main --depot-id 4
    environment:
      - CONFIG_PATH=/app/config/fleet.yaml
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=gridsentinel-token
      - INFLUXDB_ORG=gridsentinel
      - INFLUXDB_BUCKET=telemetry
      - REDIS_URL=redis://redis:6379
      - DEPOT_ID=4
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gridsentinel

  # ---------------------------------------------------------------------------
  # Phase 5 — API + Dashboard
  # ---------------------------------------------------------------------------

  api:
    <<: *python-base
    container_name: gs-api
    command: uvicorn dashboard.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: gs-dashboard
    ports:
      - "3002:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    networks:
      - gridsentinel

volumes:
  localstack_data:
  redis_data:
  influxdb_data:
  grafana_data:

networks:
  gridsentinel:
    driver: bridge
