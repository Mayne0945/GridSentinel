name: GridSentinel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry==1.8.2
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Ruff lint
        run: poetry run ruff check .
      - name: Ruff format check
        run: poetry run ruff format --check .
      - name: Mypy type check
        run: poetry run mypy config/ bft/ --ignore-missing-imports

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry==1.8.2
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run unit tests
        run: poetry run pytest tests/unit/ -v --cov=config --cov=bft --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry==1.8.2
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run integration tests
        run: poetry run pytest tests/integration/ -v
        env:
          REDIS_URL: redis://localhost:6379

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build Python base image
        run: docker build -f Dockerfile.python -t gridsentinel-base .
      - name: Validate docker-compose syntax
        run: docker compose config --quiet
