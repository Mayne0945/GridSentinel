  mpc-depot-4:
    <<: *python-base
    container_name: gs-mpc-d4
    command: python -m mpc.depot.solver --depot-id 4
    environment:
      - CONFIG_PATH=/app/config/fleet.yaml
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=gridsentinel-token
      - INFLUXDB_ORG=gridsentinel
      - INFLUXDB_BUCKET=telemetry
      - REDIS_URL=redis://redis:6379
      - DEPOT_ID=4
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gridsentinel

  mpc-coordinator:
    <<: *python-base
    container_name: gs-mpc-coordinator
    command: python -m mpc.coordinator.coordinator
    depends_on:
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Phase 4 — Digital Twin (one per depot)
  # ---------------------------------------------------------------------------

  digital-twin-depot-0:
    <<: *python-base
    container_name: gs-dt-d0
    command: python -m digital_twin.main --depot-id 0
    environment:
      - CONFIG_PATH=/app/config/fleet.yaml
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=gridsentinel-token
      - INFLUXDB_ORG=gridsentinel
      - INFLUXDB_BUCKET=telemetry
      - REDIS_URL=redis://redis:6379
      - DEPOT_ID=0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gridsentinel

  digital-twin-depot-1:
    <<: *python-base
    container_name: gs-dt-d1
    command: python -m digital_twin.main --depot-id 1
    environment:
      - CONFIG_PATH=/app/config/fleet.yaml
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=gridsentinel-token
      - INFLUXDB_ORG=gridsentinel
      - INFLUXDB_BUCKET=telemetry
      - REDIS_URL=redis://redis:6379
      - DEPOT_ID=1
    depends_on:
